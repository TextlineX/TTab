name: Build and Release Extension

on:
  push:
    tags:
      - 'v*' # 当推送形如 v1.0.0 的 tag 时触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build Project
        run: pnpm build

      - name: Package Extension
        run: |
          cd dist
          zip -r ../ttab-extension.zip .
          cd ..

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: ttab-extension.zip
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true # 自动生成版本变化说明
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
