name: Build and Release Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build Project
        run: pnpm build

      - name: Package Extension (Zip)
        run: |
          cd dist
          zip -r ../ttab-extension.zip .
          cd ..

      - name: Package Extension (CRX)
        run: |
          # 使用 npx crx 工具进行打包
          # 注意：这里我们生成一个临时的私钥。
          # 如果你有固定的 .pem 密钥，建议将其存入 GitHub Secrets 并在此时引入。
          npx crx pack dist -o ttab-extension.crx

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ttab-extension.zip
            ttab-extension.crx
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
