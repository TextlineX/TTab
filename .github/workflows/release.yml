name: Build and Release Extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # 关键：确保 Action 有权限写入 Release 和读取 Commits

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以生成发布日志

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build Project
        run: pnpm build

      - name: Package Extension (Zip)
        run: |
          cd dist
          zip -r ../ttab-extension.zip .
          cd ..

      - name: Package Extension (CRX)
        run: |
          # 1. 生成临时私钥 (CRX 必须有私钥签名)
          openssl genrsa 2048 > private.pem
          # 2. 安装 crx 命令行工具
          npm install -g crx
          # 3. 执行打包
          crx pack dist -p private.pem -o ttab-extension.crx

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ttab-extension.zip
            ttab-extension.crx
          name: TTab ${{ github.ref_name }}
          body: |
            ## 🚀 what's New in ${{ github.ref_name }}
            
            This release was automatically generated by GitHub Actions.
            
            ### 📦 Files
            - `ttab-extension.zip`: Manual installation (Recommended)
            - `ttab-extension.crx`: Standard extension package
          draft: false
          prerelease: false
          generate_release_notes: true # 启用 GitHub 自动生成变更记录
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
